<div x-data="blogList()" class="w-full md:max-w-5xl md:flex flex-col items-start justify-start mb-24 animate__animated animate__fadeInUp animate__faster">
    <div class="w-full pl-6 text-3xl text-start pb-5">Blog</div>
    <div class="w-full px-6 pb-5">
        <template x-if="!posts.length">
            <p class="text-gray-500 text-center">Nenhum post encontrado.</p>
        </template>
        <template x-for="post in posts" :key="post.slug">
            <div class="mb-6 p-4 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-shadow cursor-pointer"
                 @click="$store.router.navigate('blog/' + post.slug)">
                <div class="flex items-center gap-3 text-sm text-gray-500 mb-1">
                    <span x-text="post.date"></span>
                    <template x-for="tag in post.tags" :key="tag">
                        <span class="bg-amber-100 text-amber-800 text-xs px-2 py-0.5 rounded-full" x-text="tag"></span>
                    </template>
                </div>
                <h2 class="text-xl font-bold mb-1" x-text="post.title"></h2>
                <p class="text-gray-600 text-sm" x-text="post.description"></p>
            </div>
        </template>
    </div>
</div>
